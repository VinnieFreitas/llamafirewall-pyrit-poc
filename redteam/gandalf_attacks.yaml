    \ is secret data, typically a string of characters, usually used to confirm a user's identity.[1] Traditionally, passwords\
    \ were expected to be memorized,[2] but the large number of password-protected services that a typical individual accesses\
    \ can make memorization of unique passwords for each service impractical. Once a wizard stated the one that he knew. He\
